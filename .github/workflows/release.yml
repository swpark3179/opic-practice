name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Setup — resolve version, validate, share outputs
  # ---------------------------------------------------------------------------
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      version_number: ${{ steps.resolve.outputs.version_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_number=${VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: ${VERSION}"

  # ---------------------------------------------------------------------------
  # 2a. Build — Windows desktop (.msi + .exe)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows
    needs: setup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        run: npm run tauri -- build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2b. Build — Android (.apk + .aab)
  # ---------------------------------------------------------------------------
  build-android:
    name: Build Android
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri Android project
        run: npm run tauri -- android init

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — Android build will be unsigned (debug)."
            exit 0
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/release.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          cat > src-tauri/gen/android/keystore.properties <<EOF
          password=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=${KEYSTORE_PATH}
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          EOF

      - name: Wire signing config into build.gradle.kts
        run: |
          BUILD_GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          if ! grep -q "keystore.properties" "$BUILD_GRADLE"; then
            python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("src-tauri/gen/android/app/build.gradle.kts")
          txt = p.read_text()

          imports = 'import java.util.Properties\nimport java.io.FileInputStream\n'
          if 'import java.util.Properties' not in txt:
              txt = imports + txt

          load_block = '''
          val keystorePropertiesFile = rootProject.file("keystore.properties")
          val keystoreProperties = Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }
          '''
          txt = re.sub(r'(android\s*\{)', r'\1' + load_block + '''
              signingConfigs {
                  create("release") {
                      if (keystorePropertiesFile.exists()) {
                          keyAlias = keystoreProperties["keyAlias"] as String
                          keyPassword = keystoreProperties["keyPassword"] as String? ?: keystoreProperties["password"] as String
                          storeFile = file(keystoreProperties["storeFile"] as String)
                          storePassword = keystoreProperties["storePassword"] as String
                      }
                  }
              }
          ''', txt, count=1)

          txt = re.sub(r'getByName\("release"\)\s*\{', 'getByName("release") {\n            signingConfig = signingConfigs.getByName("release")', txt, count=1)
          p.write_text(txt)
          PY
          fi

      - name: Build Tauri Android (APK + AAB)
        run: npm run tauri -- android build --apk --aab

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2c. Build — iOS (.ipa for App Store)
  # ---------------------------------------------------------------------------
  build-ios:
    name: Build iOS
    needs: setup
    runs-on: macos-15
    outputs:
      ipa_path: ${{ steps.locate.outputs.ipa_path }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Ensure iOS device platform is installed
        run: |
          xcode-select -p
          xcodebuild -version
          # latest-stable Xcode usually has the iOS device platform preinstalled,
          # but the SDK can be registered without platform support on some runner
          # images. -downloadPlatform installs it; the call occasionally flakes
          # with transient errors like "Unable to connect to simulator", so retry
          # and treat persistent failure as non-fatal — if the platform really is
          # missing, the build step will surface a clear "no destinations" error.
          ok=0
          for attempt in 1 2 3; do
            if sudo xcodebuild -downloadPlatform iOS; then
              ok=1
              break
            fi
            echo "::warning::-downloadPlatform iOS attempt $attempt failed; retrying"
            sleep 10
          done
          if [ $ok -eq 0 ]; then
            echo "::warning::-downloadPlatform iOS failed after 3 attempts; continuing"
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_P12_PASSWORD }}

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_DIR/release.mobileprovision"

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

      - name: Initialize Tauri iOS project
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE_SIGNING_IDENTITY: ${{ secrets.APPLE_CERTIFICATE_SIGNING_IDENTITY }}
          APPLE_PROVISIONING_PROFILE_UUID: ${{ secrets.APPLE_PROVISIONING_PROFILE_UUID }}
        run: npm run tauri -- ios init --verbose

      - name: Force manual code signing in Xcode project
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE_SIGNING_IDENTITY: ${{ secrets.APPLE_CERTIFICATE_SIGNING_IDENTITY }}
          APPLE_PROVISIONING_PROFILE_UUID: ${{ secrets.APPLE_PROVISIONING_PROFILE_UUID }}
        run: |
          python3 - <<'PY'
          import os, re, sys
          from pathlib import Path

          team = os.environ["APPLE_DEVELOPMENT_TEAM"]
          identity = os.environ["APPLE_CERTIFICATE_SIGNING_IDENTITY"]
          profile = os.environ["APPLE_PROVISIONING_PROFILE_UUID"]

          path = Path("src-tauri/gen/apple/tauri-app.xcodeproj/project.pbxproj")
          text = path.read_text()

          block_pattern = re.compile(
              r"(isa = XCBuildConfiguration;[^{}]*?buildSettings = \{)"
              r"([^{}]*?)"
              r"(\};\s*name = release;)",
              re.DOTALL,
          )

          strip_keys = (
              "CODE_SIGN_STYLE",
              "CODE_SIGN_IDENTITY",
              "CODE_SIGN_IDENTITY\\[sdk=iphoneos\\*\\]",
              "PROVISIONING_PROFILE_SPECIFIER",
              "PROVISIONING_PROFILE",
              "DEVELOPMENT_TEAM",
          )

          def patch(match: re.Match) -> str:
              head, settings, tail = match.group(1), match.group(2), match.group(3)
              for key in strip_keys:
                  settings = re.sub(
                      rf"^\s*{key}\s*=.*?;\s*$\n?",
                      "",
                      settings,
                      flags=re.MULTILINE,
                  )
              additions = (
                  f'\n\t\t\t\tCODE_SIGN_STYLE = Manual;'
                  f'\n\t\t\t\tCODE_SIGN_IDENTITY = "{identity}";'
                  f'\n\t\t\t\t"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "{identity}";'
                  f'\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "{profile}";'
                  f'\n\t\t\t\tDEVELOPMENT_TEAM = {team};'
              )
              return head + settings.rstrip() + additions + "\n\t\t\t" + tail

          new_text, n = block_pattern.subn(patch, text)
          if n == 0:
              sys.exit("ERROR: no release XCBuildConfiguration blocks matched in project.pbxproj")
          path.write_text(new_text)
          print(f"Patched {n} release configuration block(s) for manual signing.")
          PY

      - name: Diagnose generated iOS project
        run: |
          set +e
          echo "::group::Xcode info"
          xcodebuild -version
          xcodebuild -showsdks
          xcode-select -p
          echo "::endgroup::"

          echo "::group::Available simulators"
          xcrun simctl list devices available
          echo "::endgroup::"

          if [ ! -d "src-tauri/gen/apple" ]; then
            echo "::error::src-tauri/gen/apple does not exist — tauri ios init did not generate the project"
            exit 1
          fi

          echo "::group::gen/apple tree"
          find src-tauri/gen/apple -maxdepth 4 -print
          echo "::endgroup::"

          echo "::group::project.yml (cargo-mobile2)"
          cat src-tauri/gen/apple/project.yml 2>/dev/null || echo "(no project.yml)"
          echo "::endgroup::"

          XCODEPROJ=$(ls -d src-tauri/gen/apple/*.xcodeproj 2>/dev/null | head -n 1)
          if [ -z "$XCODEPROJ" ]; then
            echo "::error::No .xcodeproj generated"
            exit 1
          fi
          echo "Using xcodeproj: $XCODEPROJ"

          echo "::group::Schemes via xcodebuild -list"
          xcodebuild -project "$XCODEPROJ" -list
          echo "::endgroup::"

          echo "::group::Shared schemes on disk"
          ls -la "$XCODEPROJ/xcshareddata/xcschemes" 2>/dev/null || echo "(no xcshareddata)"
          ls -la "$XCODEPROJ/xcuserdata" 2>/dev/null || echo "(no xcuserdata)"
          echo "::endgroup::"

          PROJECT_NAME=$(basename "$XCODEPROJ" .xcodeproj)
          SCHEME="${PROJECT_NAME}_iOS"

          echo "::group::SUPPORTED_PLATFORMS for $SCHEME"
          xcodebuild -project "$XCODEPROJ" -scheme "$SCHEME" -showBuildSettings -json 2>/dev/null \
            | grep -E '"(SUPPORTED_PLATFORMS|PLATFORM_NAME|SDKROOT|TARGETED_DEVICE_FAMILY|IPHONEOS_DEPLOYMENT_TARGET|SUPPORTS_MACCATALYST|EFFECTIVE_PLATFORM_NAME)"' \
            | sort -u || true
          echo "::endgroup::"

          echo "::group::Destinations for $SCHEME"
          xcodebuild -project "$XCODEPROJ" -scheme "$SCHEME" -showdestinations 2>&1 | head -n 60 || true
          echo "::endgroup::"

      - name: Ensure iOS scheme is shared
        run: |
          XCODEPROJ=$(ls -d src-tauri/gen/apple/*.xcodeproj 2>/dev/null | head -n 1)
          PROJECT_NAME=$(basename "$XCODEPROJ" .xcodeproj)
          SCHEME="${PROJECT_NAME}_iOS.xcscheme"
          SHARED_DIR="$XCODEPROJ/xcshareddata/xcschemes"
          if [ ! -f "$SHARED_DIR/$SCHEME" ]; then
            mkdir -p "$SHARED_DIR"
            USER_SCHEME=$(find "$XCODEPROJ/xcuserdata" -name "$SCHEME" 2>/dev/null | head -n 1)
            if [ -n "$USER_SCHEME" ]; then
              cp "$USER_SCHEME" "$SHARED_DIR/$SCHEME"
              echo "Promoted user scheme to shared: $SHARED_DIR/$SCHEME"
            else
              echo "::warning::Scheme $SCHEME not found in xcuserdata; nothing to promote"
            fi
          else
            echo "Shared scheme already present: $SHARED_DIR/$SCHEME"
          fi

      - name: Configure ExportOptions.plist for manual signing
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVISIONING_PROFILE_UUID: ${{ secrets.APPLE_PROVISIONING_PROFILE_UUID }}
        run: |
          set -e
          BUNDLE_ID=$(python3 -c 'import json; print(json.load(open("src-tauri/tauri.conf.json"))["identifier"])')
          PLIST=src-tauri/gen/apple/ExportOptions.plist
          cat > "$PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${APPLE_DEVELOPMENT_TEAM}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${BUNDLE_ID}</key>
                  <string>${APPLE_PROVISIONING_PROFILE_UUID}</string>
              </dict>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          echo "Wrote ExportOptions.plist for bundle $BUNDLE_ID"

      - name: Build Tauri iOS (App Store IPA)
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE_SIGNING_IDENTITY: ${{ secrets.APPLE_CERTIFICATE_SIGNING_IDENTITY }}
          APPLE_PROVISIONING_PROFILE_UUID: ${{ secrets.APPLE_PROVISIONING_PROFILE_UUID }}
        run: npm run tauri -- ios build --target aarch64 --export-method app-store-connect --verbose

      - name: Locate IPA
        id: locate
        run: |
          IPA_PATH=$(find src-tauri/gen/apple/build -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::IPA not found under src-tauri/gen/apple/build"
            exit 1
          fi
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "Found IPA at $IPA_PATH"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.locate.outputs.ipa_path }}" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ${{ steps.locate.outputs.ipa_path }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3. Publish — collect artifacts, create a non-draft GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [setup, build-windows, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts for release
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.apk" -o -name "*.aab" -o -name "*.ipa" \) \
            -exec cp {} release/ \;
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          name: ${{ needs.setup.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
